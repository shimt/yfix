name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy --tests -- -D warnings
      - name: Format check
        run: cargo fmt --check

  brew-lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Style check formula
        run: brew style Formula/yfix.rb
      - name: Tap and audit formula
        run: |
          brew tap shimt/yfix "$(pwd)"
          brew audit shimt/yfix/yfix

  cross-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-pc-windows-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --locked
      - name: Cross check
        run: cross check --target ${{ matrix.target }}
