name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: yfix-aarch64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: yfix-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: yfix-aarch64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: yfix-x86_64-pc-windows-msvc.zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: yfix-aarch64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Add ARM target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: "!contains(matrix.artifact, '.zip')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }} yfix
          cd ../../..

      - name: Package (zip)
        if: contains(matrix.artifact, '.zip')
        shell: pwsh
        run: Compress-Archive "target/${{ matrix.target }}/release/yfix.exe" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-formula:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Formula/yfix.rb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_DARWIN=$(sha256sum artifacts/yfix-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(sha256sum artifacts/yfix-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum artifacts/yfix-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          sed -i "s|/download/v[0-9.][0-9.]*/|/download/v${VERSION}/|g" Formula/yfix.rb
          sed -i "/aarch64-apple-darwin/{n;s/sha256 \".*\"/sha256 \"${SHA_DARWIN}\"/}" Formula/yfix.rb
          sed -i "/x86_64-unknown-linux-gnu/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_X86}\"/}" Formula/yfix.rb
          sed -i "/aarch64-unknown-linux-gnu/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM}\"/}" Formula/yfix.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/yfix.rb
          git diff --cached --quiet || git commit -m "chore: update Formula for ${GITHUB_REF_NAME}"
          git push origin main
